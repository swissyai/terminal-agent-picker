name: build-check

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  shell-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: shell syntax check
        run: |
          sudo apt-get update && sudo apt-get install -y zsh
          zsh -n terminal-agent-picker.zsh terminal-agent-picker.sh
          bash -n terminal-agent-picker.bash terminal-agent-picker.sh
          git diff --check
      - name: launch smoke with fake agent
        run: |
          tmp="$(mktemp -d)"
          mkdir -p "$tmp/bin" "$tmp/home"
          cat > "$tmp/bin/codex" <<'EOF'
          #!/bin/sh
          printf 'FAKE_CODEX:'
          for arg do
            printf ' <%s>' "$arg"
          done
          printf '\n'
          EOF
          chmod +x "$tmp/bin/codex"
          printf '1\n\n\n\n' |
            env -i HOME="$tmp/home" ZDOTDIR="$tmp/home" PATH="$tmp/bin:/usr/bin:/bin" TERM=xterm \
            zsh -fic 'cd "$1" && source ./terminal-agent-picker.zsh' ntap "$PWD" > "$tmp/out" 2>&1
          grep -F 'FAKE_CODEX: <-m> <gpt-5.5> <-c> <model_reasoning_effort=high> <-s> <workspace-write> <-a> <on-request>' "$tmp/out"

          tmp="$(mktemp -d)"
          mkdir -p "$tmp/bin" "$tmp/home"
          cat > "$tmp/bin/codex" <<'EOF'
          #!/bin/sh
          printf 'FAKE_CODEX:'
          for arg do
            printf ' <%s>' "$arg"
          done
          printf '\n'
          EOF
          chmod +x "$tmp/bin/codex"
          printf '1\n\n\n\n' |
            env -i HOME="$tmp/home" PATH="$tmp/bin:/usr/bin:/bin" TERM=xterm \
            bash --noprofile --norc -ic 'cd "$1" && source ./terminal-agent-picker.bash' ntap "$PWD" > "$tmp/out" 2>&1
          grep -F 'FAKE_CODEX: <-m> <gpt-5.5> <-c> <model_reasoning_effort=high> <-s> <workspace-write> <-a> <on-request>' "$tmp/out"

          tmp="$(mktemp -d)"
          mkdir -p "$tmp/bin" "$tmp/home" "$tmp/work"
          cat > "$tmp/bin/codex" <<'EOF'
          #!/bin/sh
          printf 'FAKE_CODEX:'
          for arg do
            printf ' <%s>' "$arg"
          done
          printf '\n'
          EOF
          chmod +x "$tmp/bin/codex"
          mkdir -p "$tmp/work/inside"
          printf 'path\n1\nparent\n\nnew\nmade-by-word\n1\n\n\n\n' |
            env -i HOME="$tmp/home" ZDOTDIR="$tmp/home" PATH="$tmp/bin:/usr/bin:/bin" TERM=xterm NTAP_MODE=terminal-new \
            zsh -fic 'cd "$1" && source "$2" && printf "PWD=%s\n" "$PWD"' ntap "$tmp/work" "$PWD/terminal-agent-picker.zsh" > "$tmp/out" 2>&1
          grep -F 'choose folder' "$tmp/out"
          grep -F 'parent folder' "$tmp/out"
          grep -F 'FAKE_CODEX: <-m> <gpt-5.5> <-c> <model_reasoning_effort=high> <-s> <workspace-write> <-a> <on-request>' "$tmp/out"
          grep -F "PWD=$tmp/work/made-by-word" "$tmp/out"

          tmp="$(mktemp -d)"
          mkdir -p "$tmp/bin" "$tmp/home" "$tmp/tmp"
          cat > "$tmp/bin/claude" <<'EOF'
          #!/bin/sh
          printf 'FAKE_CLAUDE:'
          prev=
          for arg do
            printf ' <%s>' "$arg"
            if [ "$prev" = "--append-system-prompt-file" ] || [ "$prev" = "--system-prompt-file" ]; then
              printf ' PROMPT_TEXT='
              tr '\n' ' ' < "$arg"
            fi
            prev=$arg
          done
          printf '\n'
          EOF
          chmod +x "$tmp/bin/claude"
          printf 'Replacement prompt.\n' > "$tmp/system-prompt.txt"
          printf '1\n2\n\n\n2\n%s\n' "$tmp/system-prompt.txt" |
            env -i HOME="$tmp/home" ZDOTDIR="$tmp/home" PATH="$tmp/bin:/usr/bin:/bin" TERM=xterm TMPDIR="$tmp/tmp/" \
            zsh -fic 'cd "$1" && source ./terminal-agent-picker.zsh' ntap "$PWD" > "$tmp/out" 2>&1
          grep -F 'system prompt replaced for this session' "$tmp/out"
          grep -F 'FAKE_CLAUDE: <--model> <opus> <--effort> <high> <--permission-mode> <acceptEdits> <--system-prompt-file>' "$tmp/out"
          grep -F 'PROMPT_TEXT=Replacement prompt.' "$tmp/out"
          test -z "$(find "$tmp/tmp" -maxdepth 1 -name 'ntap-system-prompt.*.txt' -print 2>/dev/null | head -n 1)"

          tmp="$(mktemp -d)"
          mkdir -p "$tmp/bin" "$tmp/home" "$tmp/tmp"
          cat > "$tmp/bin/claude" <<'EOF'
          #!/bin/sh
          printf 'FAKE_CLAUDE:'
          prev=
          for arg do
            printf ' <%s>' "$arg"
            if [ "$prev" = "--append-system-prompt-file" ] || [ "$prev" = "--system-prompt-file" ]; then
              printf ' PROMPT_TEXT='
              tr '\n' ' ' < "$arg"
            fi
            prev=$arg
          done
          printf '\n'
          EOF
          chmod +x "$tmp/bin/claude"
          printf 'Replacement prompt.\n' > "$tmp/system-prompt.txt"
          printf '1\n2\n\n\n2\n%s\n' "$tmp/system-prompt.txt" |
            env -i HOME="$tmp/home" PATH="$tmp/bin:/usr/bin:/bin" TERM=xterm TMPDIR="$tmp/tmp/" \
            bash --noprofile --norc -ic 'cd "$1" && source ./terminal-agent-picker.bash' ntap "$PWD" > "$tmp/out" 2>&1
          grep -F 'system prompt replaced for this session' "$tmp/out"
          grep -F 'FAKE_CLAUDE: <--model> <opus> <--effort> <high> <--permission-mode> <acceptEdits> <--system-prompt-file>' "$tmp/out"
          grep -F 'PROMPT_TEXT=Replacement prompt.' "$tmp/out"
          test -z "$(find "$tmp/tmp" -maxdepth 1 -name 'ntap-system-prompt.*.txt' -print 2>/dev/null | head -n 1)"

          printf 'Full replacement prompt.\nSecond line.\n' > "$tmp/full-system.txt"
          printf 'c\n1\n2\n\n\n2\n%s\n' "$tmp/full-system.txt" |
            env -i HOME="$tmp/home" ZDOTDIR="$tmp/home" PATH="$tmp/bin:/usr/bin:/bin" TERM=xterm TMPDIR="$tmp/tmp/" \
            zsh -fic 'cd "$1" && source ./terminal-agent-picker.zsh' ntap "$PWD" > "$tmp/out" 2>&1
          grep -F 'system prompt replaced for this session' "$tmp/out"
          grep -F 'FAKE_CLAUDE: <--model> <opus> <--effort> <high> <--permission-mode> <acceptEdits> <--system-prompt-file>' "$tmp/out"
          grep -F 'PROMPT_TEXT=Full replacement prompt. Second line.' "$tmp/out"

          tmp="$(mktemp -d)"
          prompt_name="ci-picker-prompt-$$.txt"
          mkdir -p "$tmp/bin" "$tmp/home" "$tmp/tmp" "$tmp/work" local-prompts
          cat > "$tmp/bin/claude" <<'EOF'
          #!/bin/sh
          printf 'FAKE_CLAUDE:'
          prev=
          for arg do
            printf ' <%s>' "$arg"
            if [ "$prev" = "--append-system-prompt-file" ] || [ "$prev" = "--system-prompt-file" ]; then
              printf ' PROMPT_TEXT='
              tr '\n' ' ' < "$arg"
            fi
            prev=$arg
          done
          printf '\n'
          EOF
          chmod +x "$tmp/bin/claude"
          printf 'Picker-local prompt.\n' > "local-prompts/$prompt_name"
          printf '1\n2\n\n\n2\n%s\n' "$prompt_name" |
            env -i HOME="$tmp/home" ZDOTDIR="$tmp/home" PATH="$tmp/bin:/usr/bin:/bin" TERM=xterm TMPDIR="$tmp/tmp/" \
            zsh -fic 'cd "$1" && source "$2"' ntap "$tmp/work" "$PWD/terminal-agent-picker.zsh" > "$tmp/out" 2>&1
          grep -F 'system prompt replaced for this session' "$tmp/out"
          grep -F "local-prompts/$prompt_name" "$tmp/out"
          grep -F 'PROMPT_TEXT=Picker-local prompt.' "$tmp/out"
          rm -f "local-prompts/$prompt_name"
          rmdir local-prompts 2>/dev/null || true
      - name: wrong shells no-op cleanly
        run: |
          bash -c 'source ./terminal-agent-picker.zsh'
          sh -c '. ./terminal-agent-picker.zsh'
          zsh -fc 'source ./terminal-agent-picker.bash'
          sh -c '. ./terminal-agent-picker.bash'
          sh -c '. ./terminal-agent-picker.sh'
      - name: install and uninstall round-trip
        run: |
          tmp="$(mktemp -d)"
          printf '# existing rc\n' > "$tmp/.zshrc"
          printf '# existing rc\n' > "$tmp/expected"
          HOME="$tmp" ./install.sh --shell zsh >/dev/null
          HOME="$tmp" ./install.sh --shell zsh --uninstall >/dev/null
          cmp -s "$tmp/.zshrc" "$tmp/expected"

          tmp="$(mktemp -d)"
          printf 'source /x/terminal-agent-picker.zsh\n' > "$tmp/.zshrc"
          HOME="$tmp" ./install.sh --shell zsh >/dev/null
          grep -F "source \"$PWD/terminal-agent-picker.zsh\"" "$tmp/.zshrc"
          test -z "$(find "$tmp" -maxdepth 1 -name '.zshrc.tmp*' -print)"

          tmp="$(mktemp -d)"
          printf '# existing bashrc\n' > "$tmp/.bashrc"
          printf '# existing profile\n' > "$tmp/.bash_profile"
          printf '# existing bashrc\n' > "$tmp/expected-bashrc"
          printf '# existing profile\n' > "$tmp/expected-profile"
          HOME="$tmp" ./install.sh --shell bash >/dev/null
          grep -F "source \"$PWD/terminal-agent-picker.bash\"" "$tmp/.bashrc"
          grep -F "source \"$PWD/terminal-agent-picker.bash\"" "$tmp/.bash_profile"
          HOME="$tmp" ./install.sh --shell bash --uninstall >/dev/null
          cmp -s "$tmp/.bashrc" "$tmp/expected-bashrc"
          cmp -s "$tmp/.bash_profile" "$tmp/expected-profile"

          tmp="$(mktemp -d)"
          printf '# existing bashrc\n' > "$tmp/.bashrc"
          HOME="$tmp" ./install.sh --shell bash >/dev/null
          grep -F "source \"$PWD/terminal-agent-picker.bash\"" "$tmp/.bashrc"
          test ! -e "$tmp/.bash_profile"
